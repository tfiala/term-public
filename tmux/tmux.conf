# term-public base tmux config.
#
# `hive tmux` generates a per-hive config that `source-file`s this file
# first, so the settings below apply to every hive session (and to plain
# tmux sessions).

# --- Prefix: backtick ---------------------------------------------------------
# The `hive tmux` keybindings (backtick + c/b/g/G/C-g/R/r) live in the
# prefix table, so the prefix must be backtick.
set -g prefix `
unbind C-b
bind ` send-prefix

# --- Claude CLI rendering (ADR-0063) ------------------------------------------
# allow-passthrough lets Claude CLI's DEC 2026 synchronized-output and
# progress sequences pass through tmux instead of being mangled — the
# decisive setting that makes Claude CLI render correctly inside tmux.
set -g allow-passthrough on

set -s default-terminal "tmux-256color"
# True colour + the terminal features Claude CLI needs. Non-appending
# `set -s` (not `set -as`) so re-sourcing the config doesn't duplicate.
set -s terminal-overrides 'linux*:AX@,*256col*:RGB'
# `sync` = synchronized output (BSU/ESU): tmux renders complete frames
# atomically, which kills the streaming-update flicker. `extkeys` passes
# Shift+Enter and other modifier combos through to the application.
set -s terminal-features 'xterm-ghostty:clipboard:ccolour:cstyle:focus:title:extkeys:sync,xterm*:clipboard:ccolour:cstyle:focus:title:extkeys:sync,screen*:title,rxvt*:ignorefkeys'
# `always`: tmux doesn't recognize Claude CLI's CSI-u request, so forward
# extended keys unconditionally rather than only when the app asks.
set -s extended-keys always
set -sg escape-time 0
set -g focus-events on
set -g history-limit 250000

# Mouse is left OFF by default: tmux mouse mode can capture scroll events
# that Claude CLI needs (claude-code#38810). Opt in per-machine via the
# local overlay if you want it: `set -g mouse on`.

# --- Sensible defaults --------------------------------------------------------
set-window-option -g mode-keys vi
set -g base-index 1
setw -g pane-base-index 1
set -g aggressive-resize off

# Reload this config (a hive session's generated config overrides this
# binding to reload the hive config instead).
bind r source-file "$HOME/.tmux/tmux.conf" \; display "Reloaded!"

# Splits and pane navigation.
bind | split-window -h
bind - split-window -v
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# 'v' begins a character selection in copy-mode-vi.
bind-key -T copy-mode-vi 'v' send-keys -X begin-selection

# Ctrl-o: clear screen + scrollback (like Cmd-K in Terminal/iTerm).
bind -n C-o send-keys " reset && tmux clear-history" "Enter"
